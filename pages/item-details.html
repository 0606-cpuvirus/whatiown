<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Details - What I Own</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>
    <script src="../js/app.js"></script>
</head>

<body>
    <div class="container" style="max-width: 800px;">
        <header class="mb-1 mt-1">
            <a href="wardrobe.html">&larr; Back to Wardrobe</a>
        </header>

        <div id="item-content" class="card grid-2">
            Loading...
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const itemId = urlParams.get('id');
        const container = document.getElementById('item-content');

        if (!itemId) {
            container.innerHTML = 'Item ID not provided.';
        } else {
            requireAuth().then(async (user) => {
                try {
                    const item = await databases.getDocument(DB_ID, COLLECTIONS.WARDROBE_ITEMS, itemId);

                    let imgUrl = item.imageUrl;
                    if (!imgUrl && item.imageFileId) {
                        imgUrl = storage.getFileView(BUCKET_ID, item.imageFileId).toString();
                    }

                    container.innerHTML = `
                        <div>
                            <img src="${imgUrl || 'https://via.placeholder.com/400'}" style="width: 100%; border-radius: 8px;">
                        </div>
                        <div>
                            <h1>${item.itemName || item.category}</h1>
                            <p class="mb-1" style="color: #aaa;">${item.brand || 'No brand'}</p>
                            
                            <div class="grid-2 mb-1">
                                <div><strong>Category:</strong> ${item.category}</div>
                                <div><strong>Layer:</strong> ${item.layerType}</div>
                                <div><strong>Warmth:</strong> ${item.warmthLevel}</div>
                                <div><strong>Fit:</strong> ${item.fitType}</div>
                                <div><strong>Color:</strong> ${item.colorPrimary}</div>
                            </div>
                            
                            <p><strong>Notes:</strong> ${item.notes || 'None'}</p>
                            
                            <div class="mt-2">
                                <button class="secondary" onclick="alert('Edit feature coming soon')">Unknown Edit</button>
                                <button style="background-color: #ff4444;" onclick="deleteItem('${item.$id}')">Delete</button>
                            </div>
                        </div>
                    `;
                } catch (e) {
                    console.error(e);
                    container.innerHTML = 'Error loading item.';
                }
            });
        }

        async function deleteItem(id) {
            if (confirm('Are you sure you want to delete this item?')) {
                try {
                    await databases.deleteDocument(DB_ID, COLLECTIONS.WARDROBE_ITEMS, id);
                    window.location.href = 'wardrobe.html';
                } catch (e) {
                    alert('Delete failed: ' + e.message);
                }
            }
        }
    </script>
</body>

</html>
