<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - What I Own</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>
    <script src="../js/app.js"></script>
</head>

<body>
    <div class="container" style="max-width: 400px; margin-top: 10vh;">
        <h2 class="text-center">Reset Password</h2>
        <div class="card mt-1">
            <form id="reset-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <button type="submit" style="width: 100%;">Send Recovery Email</button>
            </form>
            <div class="mt-1 text-center" id="msg" style="display: none;"></div>
        </div>
        <div class="text-center mt-1">
            <a href="login.html" style="font-size: 0.9rem;">Back to Login</a>
        </div>
    </div>

    <script>
        const resetForm = document.getElementById('reset-form');
        const msg = document.getElementById('msg');

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            msg.style.display = 'none';

            const email = document.getElementById('email').value;

            try {
                // Redirect back to login page after reset
                const url = window.location.href.replace('forgot-password.html', 'login.html');
                await account.createRecovery(email, url);

                msg.textContent = 'Recovery email sent. Please check your inbox.';
                msg.style.color = '#55ff55';
                msg.style.display = 'block';
            } catch (err) {
                console.error(err);
                msg.textContent = err.message;
                msg.style.color = '#ff5555';
                msg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
