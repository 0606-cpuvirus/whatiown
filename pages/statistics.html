<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - What I Own</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>
    <script src="../js/app.js"></script>
    <style>
        .heatmap-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .heatmap-cell {
            background: #333;
            height: 20px;
            border-radius: 2px;
        }

        .level-1 {
            background: #444;
        }

        .level-2 {
            background: #666;
        }

        .level-3 {
            background: #888;
        }

        .level-4 {
            background: #aaa;
        }
    </style>
</head>

<body>
    <div class="container">
        <header class="mb-1 mt-1 flex justify-between">
            <h1>Wardrobe Analytics</h1>
            <a href="dashboard.html"><button class="secondary">Back to Dashboard</button></a>
        </header>

        <div class="grid-2">
            <div class="card">
                <h3>Most Worn Items</h3>
                <ul id="most-worn" class="mt-1">Loading...</ul>
            </div>

            <div class="card">
                <h3>Often neglected</h3>
                <ul id="least-worn" class="mt-1">Loading...</ul>
            </div>
        </div>

        <div class="card mt-2">
            <h3>Usage Activity (Mock Heatmap)</h3>
            <div class="heatmap-grid mt-1" id="heatmap">
                <!-- JS will fill -->
            </div>
        </div>
    </div>

    <script>
        requireAuth().then(async (user) => {
            try {
                const result = await databases.listDocuments(
                    DB_ID,
                    COLLECTIONS.WARDROBE_STATISTICS,
                    [
                        Appwrite.Query.equal('userId', user.$id),
                        Appwrite.Query.limit(1)
                    ]
                );

                if (result.documents.length > 0) {
                    const stats = result.documents[0];

                    const listWorn = document.getElementById('most-worn');
                    listWorn.innerHTML = stats.mostWornItems.map(item => `<li>Item ID: ${item} (Need lookup)</li>`).join('');

                    const listNever = document.getElementById('least-worn');
                    listNever.innerHTML = stats.neverWornItems.map(item => `<li>Item ID: ${item}</li>`).join('');

                } else {
                    document.getElementById('most-worn').textContent = "Not enough data.";
                    document.getElementById('least-worn').textContent = "Not enough data.";
                }

                // Draw Mock Heatmap
                const heatmap = document.getElementById('heatmap');
                for (let i = 0; i < 52; i++) { // 52 weeks
                    const div = document.createElement('div');
                    div.className = `heatmap-cell level-${Math.floor(Math.random() * 5)}`;
                    heatmap.appendChild(div);
                }

            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>

</html>
