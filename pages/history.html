<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outfit History - What I Own</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>
    <script src="../js/app.js"></script>
</head>

<body>
    <div class="container" style="max-width: 800px;">
        <header class="mb-1 mt-1 flex justify-between">
            <h1>Outfit History</h1>
            <a href="dashboard.html"><button class="secondary">Back to Dashboard</button></a>
        </header>

        <div id="history-list">
            Loading history...
        </div>
    </div>

    <script>
        const list = document.getElementById('history-list');

        requireAuth().then(async (user) => {
            try {
                const result = await databases.listDocuments(
                    DB_ID,
                    COLLECTIONS.OUTFIT_HISTORY,
                    [
                        Appwrite.Query.equal('userId', user.$id),
                        Appwrite.Query.orderDesc('wornDate')
                    ]
                );

                if (result.documents.length === 0) {
                    list.innerHTML = '<p>No history yet. Mark an outfit as worn!</p>';
                    return;
                }

                list.innerHTML = result.documents.map(entry => {
                    const date = new Date(entry.wornDate).toLocaleDateString();
                    return `
                        <div class="card mb-1">
                            <div class="flex justify-between">
                                <h3>${date}</h3>
                                <span>${entry.seasonContext || ''} - ${entry.userSatisfaction ? entry.userSatisfaction + '★' : 'No rating'}</span>
                            </div>
                            <p class="mt-1">
                                ${entry.wasGeneratedOutfit ? '<a href="outfit-details.html?id=' + entry.outfitId + '">View Outfit Details</a>' : 'Manual Log'}
                            </p>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                console.error(err);
                list.innerHTML = 'Error loading history.';
            }
        });
    </script>
</body>

</html>
