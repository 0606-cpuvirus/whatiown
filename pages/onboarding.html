<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Setup - What I Own</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>
    <script src="../js/app.js"></script>
</head>

<body>
    <div class="container" style="max-width: 600px; margin-top: 5vh;">
        <h2 class="text-center">Profile Setup</h2>
        <div class="card mt-1">
            <form id="profile-form">
                <div class="form-group grid-2">
                    <div>
                        <label for="name">Display Name</label>
                        <input type="text" id="name" required>
                    </div>
                    <div>
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="location">Default Location</label>
                    <input type="text" id="location" placeholder="e.g. New York, USA">
                </div>

                <button type="submit">Save Profile</button>
                <a href="dashboard.html"><button type="button" class="secondary">Cancel</button></a>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('profile-form');
        let currentUserId = null;

        // Init
        requireAuth().then(async (user) => {
            currentUserId = user.$id;

            try {
                // Fetch existing profile data
                const profile = await databases.getDocument(
                    DB_ID,
                    COLLECTIONS.USER_PROFILES,
                    currentUserId
                );

                document.getElementById('name').value = profile.displayName;
                document.getElementById('gender').value = profile.gender;
                document.getElementById('location').value = profile.defaultLocation || '';
            } catch (err) {
                console.error("Profile fetch error", err);
                // Handle case where profile doc might be missing (shouldn't happen if signup worked)
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const gender = document.getElementById('gender').value;
            const location = document.getElementById('location').value;

            try {
                await databases.updateDocument(
                    DB_ID,
                    COLLECTIONS.USER_PROFILES,
                    currentUserId,
                    {
                        displayName: name,
                        gender: gender,
                        defaultLocation: location,
                        updatedAt: new Date().toISOString()
                    }
                );

                // Also update account name
                await account.updateName(name);

                alert('Profile saved!');
                window.location.href = 'dashboard.html';

            } catch (err) {
                console.error(err);
                alert('Error saving profile: ' + err.message);
            }
        });
    </script>
</body>

</html>
