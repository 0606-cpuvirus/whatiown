<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - What I Own</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>
    <script src="../js/app.js"></script>
</head>

<body>
    <div class="container" style="max-width: 400px; margin-top: 10vh;">
        <h2 class="text-center">Login</h2>
        <div class="card mt-1">
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <button type="submit" style="width: 100%;">Login</button>
            </form>
            <div class="mt-1 text-center" id="error-msg" style="color: #ff5555; display: none;"></div>
        </div>
        <div class="text-center mt-1">
            <a href="forgot-password.html" style="font-size: 0.9rem;">Forgot Password?</a>
            <br>
            <span style="color: #bbb; font-size: 0.9rem;">Don't have an account? <a href="signup.html">Sign
                    Up</a></span>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await account.createEmailPasswordSession(email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error(err);
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
