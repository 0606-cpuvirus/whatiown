<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - What I Own</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@16.0.2"></script>
    <script src="../js/app.js"></script>
</head>

<body>
    <div class="container" style="max-width: 500px; margin-top: 5vh;">
        <h2 class="text-center">Create Account</h2>
        <div class="card mt-1">
            <form id="signup-form">
                <div class="form-group">
                    <label for="name">Display Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group grid-2" style="gap: 1rem;">
                    <div>
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <div>
                        <label for="gender">Gender</label>
                        <select id="gender" required>
                            <option value="">Select...</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                <button type="submit" style="width: 100%;">Sign Up</button>
            </form>
            <div class="mt-1 text-center" id="error-msg" style="color: #ff5555; display: none;"></div>
        </div>
        <div class="text-center mt-1">
            <span style="color: #bbb; font-size: 0.9rem;">Already have an account? <a href="login.html">Login</a></span>
        </div>
    </div>

    <script>
        const signupForm = document.getElementById('signup-form');
        const errorMsg = document.getElementById('error-msg');

        signupForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const gender = document.getElementById('gender').value;

            try {
                // 1. Create User Account
                const userId = Appwrite.ID.unique();
                await account.create(userId, email, password, name);

                // 2. Login
                await account.createEmailPasswordSession(email, password);

                // 3. Create Profile Document (USER_PROFILES)
                const now = new Date().toISOString();
                await databases.createDocument(
                    DB_ID,
                    COLLECTIONS.USER_PROFILES,
                    userId, // Use userId as document ID for easier lookup
                    {
                        userId: userId,
                        displayName: name,
                        email: email,
                        gender: gender,
                        defaultLocation: 'Not set',
                        createdAt: now,
                        updatedAt: now
                    }
                );

                // 4. Create Preferences Document (USER_PREFERENCES)
                await databases.createDocument(
                    DB_ID,
                    COLLECTIONS.USER_PREFERENCES,
                    userId,
                    {
                        userId: userId,
                        favoriteColors: [],
                        dislikedColors: [],
                        favoriteCategories: [],
                        avoidCategories: [],
                        preferredFitTypes: [],
                        avoidPatterns: [],
                        createdAt: now,
                        updatedAt: now
                    }
                );

                window.location.href = 'dashboard.html';

            } catch (err) {
                console.error(err);
                errorMsg.textContent = err.message;
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
